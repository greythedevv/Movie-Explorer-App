<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="movieapp.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Explorer App</title>
    <script defer src="movieapp.js"></script>
</head>

<body>
    <div class="first">
    <h1>Movie Explorer App</h1> </div>
    <p class="subtitle">
    Discover movies, explore details, and find your next favorite film.
    </p>
    <div class="second">
<input type="text" id="inputBox" placeholder="Type movie name" />
<button id="btn">Search</button></div>
<div id="loading"></div>
<div id="result"></div>
<div id="details"></div>

    <div id="popup" class="popup">
        <div class="popup-content">
        <span id="closeBtn" class="close" style="cursor: pointer;">&times;</span>
        <div id="movieinfo"></div>
        </div>
    </div>

</body>
</html>
